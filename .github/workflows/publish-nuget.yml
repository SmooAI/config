name: Publish NuGet (SmooAI.Config)

on:
    push:
        tags:
            # Primary — matches the npm release tag produced by Changesets.
            # Version stays in lockstep with every other language client.
            - 'v*'
            # Legacy — kept so manually-pushed dotnet-only releases still work.
            - 'dotnet-v*'
            # Per-package Changesets tag (`@smooai/config@<version>`).
            - '@smooai/config@*'
    workflow_dispatch:

jobs:
    publish:
        runs-on: ubuntu-latest
        timeout-minutes: 15

        permissions:
            contents: read

        steps:
            - uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: |
                      8.0.x
                      9.0.x
                      10.0.x

            - name: Restore
              working-directory: dotnet
              run: dotnet restore

            - name: Build
              working-directory: dotnet
              run: dotnet build -c Release --no-restore

            - name: Test
              working-directory: dotnet
              run: dotnet test -c Release --no-build --verbosity normal

            - name: Pack
              working-directory: dotnet
              run: dotnet pack src/SmooAI.Config/SmooAI.Config.csproj -c Release --no-build -o dist

            - name: Push to NuGet
              working-directory: dotnet
              env:
                  NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
              run: |
                  if [ -z "${NUGET_API_KEY}" ]; then
                      echo "::error::NUGET_API_KEY secret is not set for this repo"
                      exit 1
                  fi
                  dotnet nuget push "dist/*.nupkg" \
                      --api-key "${NUGET_API_KEY}" \
                      --source https://api.nuget.org/v3/index.json \
                      --skip-duplicate
